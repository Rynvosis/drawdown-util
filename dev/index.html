<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drawdown Utility</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="header">
    <h1>Drawdown Utility</h1>
  </div>
  <p class="subtitle">Upload CSV exports, select a drawdown type, and generate grouped reports.</p>

  <div class="tabs" id="tabs"></div>

  <div id="panels"></div>

  <div id="results">
    <div class="report-toolbar no-print">
      <label class="orientation-toggle" for="pdfOrientation">
        Page orientation
        <select id="pdfOrientation">
          <option value="landscape" selected>Landscape (A4)</option>
          <option value="portrait">Portrait (A4)</option>
        </select>
      </label>
      <button id="exportPdfBtn" class="btn">Export PDF</button>
    </div>
    <div class="print-title">Drawdown Utility</div>
    <div class="summary-cards" id="summaryCards"></div>
    <div id="reportSections"></div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
