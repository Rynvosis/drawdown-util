name: Deploy to GitHub Pages

# Publishes the production site and a separate dev preview into one Pages site:
#   master                              -> https://<user>.github.io/drawdown-util/
#   claude/dev-branch-page-deploy-w34o9x -> https://<user>.github.io/drawdown-util/dev/
#
# Both branches publish to the `gh-pages` branch. The dev branch lands in the
# `dev/` subfolder, and `keep_files: true` stops each deploy from wiping the
# other branch's output.

on:
  push:
    branches:
      - master
      - claude/dev-branch-page-deploy-w34o9x

permissions:
  contents: write

# Serialize deploys so concurrent master/dev pushes can't clobber the
# gh-pages branch. Don't cancel an in-progress deploy.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Choose destination directory
        id: dest
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "dir=" >> "$GITHUB_OUTPUT"
          else
            echo "dir=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          destination_dir: ${{ steps.dest.outputs.dir }}
          keep_files: true
